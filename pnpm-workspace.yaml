packages:
  - 'packages/*'
  - 'apps/*'

# pnpm 10 blocks dependency build scripts by default and, in a workspace, only
# reads this allowlist from pnpm-workspace.yaml (not package.json). These are
# trusted native/bundler deps that must run their install scripts:
#   better-sqlite3 — compiles its SQLite binding (no musl prebuilds)
#   esbuild        — fetches its platform binary
onlyBuiltDependencies:
  - better-sqlite3
  - esbuild
