version: "3.9"
services:
  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    container_name: sovegent-identity-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - sovegent-identity-data:/app/data
    env_file:
      - ../../apps/api/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
  verify:
    image: nginx:alpine
    container_name: sovegent-identity-verify
    restart: unless-stopped
    ports: ["5173:80"]
    volumes:
      - ../../apps/verify/dist:/usr/share/nginx/html:ro
      - ./nginx-spa.conf:/etc/nginx/conf.d/default.conf:ro
  app:
    image: nginx:alpine
    container_name: sovegent-identity-app
    restart: unless-stopped
    ports: ["5174:80"]
    volumes:
      - ../../apps/app/dist:/usr/share/nginx/html:ro
      - ./nginx-spa.conf:/etc/nginx/conf.d/default.conf:ro
volumes:
  sovegent-identity-data:
