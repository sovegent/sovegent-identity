server {
    listen 80;
    server_name app.identity.sovegent.com;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl http2;
    server_name app.identity.sovegent.com;
    ssl_certificate     /etc/letsencrypt/live/app.identity.sovegent.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.identity.sovegent.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    root /var/www/sovegent-identity/app/dist;
    index index.html;
    location / { try_files $uri $uri/ /index.html; }
    location /assets/ { expires 1y; add_header Cache-Control "public, immutable"; }
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
